<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="%BASE_URL%favicon.ico" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5, minimum-scale=1"
    />
    <meta name="theme-color" content="#f7b740" />
    <script data-theme-bootstrap>
      (() => {
        const root = document.documentElement;
        let theme = null;

        try {
          const storedTheme = localStorage.getItem('theme_active');
          if (storedTheme === 'light' || storedTheme === 'dark') {
            theme = storedTheme;
          }
        } catch {
          // Fall back to the system preference when storage is unavailable.
        }

        if (!theme) {
          theme = globalThis.matchMedia?.('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        }

        root.classList.remove('light', 'dark');
        root.classList.add(theme);
        document
          .querySelector("meta[name='theme-color']")
          ?.setAttribute('content', theme === 'dark' ? '#111827' : '#f7b740');
      })();
    </script>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Procvičujte angličtinu drillem." />
    <title>Angličtina</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
